name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  offline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Kodu al
        uses: actions/checkout@v6

      - name: Python kur
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt "numpy>=1.26,<3" "pandas>=2.2,<3"

      - name: Python sözdizimi
        run: python -m py_compile signal_bot.py server.py research/*.py tests/*.py

      - name: Bot çevrimdışı testleri
        run: python -B tests/offline_tests.py

      - name: Sunucu readiness testleri
        run: python -B tests/server_tests.py

      - name: Araştırma metodoloji testleri
        working-directory: research
        run: python -B -m unittest -v test_methodology.py

      - name: Termux betiği sözdizimi
        run: sh -n termux/boot-signal-bot.sh

  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Kodu al
        uses: actions/checkout@v6

      - name: Node.js kur
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Mobil bağımlılıkları kilitten kur
        working-directory: mobile
        run: npm ci

      - name: Mobil sözdizimi ve Expo yapılandırması
        working-directory: mobile
        run: |
          npm run check
          npm run doctor
          npm audit --audit-level=high
